# Nexus dev stack — hot reload: código montado em /app + Vite (3036).
#
# Primeira vez: cp .env.example .env  →  FRONTEND_URL=http://localhost:3000  →  SMTP_ADDRESS=mailhog
# Postgres: senha/host vêm do .env; se POSTGRES_PASSWORD estiver vazio, Compose usa "postgres" (dev).
# Mudou a senha ou volume já inicializado vazio? docker compose down && docker volume rm nexus-mvp_postgres
#
# Subir (recomendado — constrói nexus:development antes do vite/rails):
#   ./bin/docker-dev-up
# Alternativa manual: docker compose build base && docker compose up -d --build
# App: http://localhost:3000  · Mailhog: http://localhost:8025  · Vite HMR: localhost:3036
#
# Baileys integrado por padrão: docker compose up --build
# Nexus e sidecar já têm defaults internos para URL e API key.

version: '3'

services:
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        BUNDLE_WITHOUT: ''
        EXECJS_RUNTIME: 'Node'
        RAILS_ENV: 'development'
        RAILS_SERVE_STATIC_FILES: 'false'
    tty: true
    stdin_open: true
    image: nexus:development
    env_file: .env

  rails:
    <<: *base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/rails.Dockerfile
    image: nexus-rails:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - vite
      - mailhog
      - sidekiq
    ports:
      - 3000:3000
    env_file: .env
    environment:
      - VITE_DEV_SERVER_HOST=vite
      # Internal defaults: BAILEYS_SIDECAR_URL=http://baileys:3500, key nexus-internal-baileys.
      - BAILEYS_SIDECAR_URL=${BAILEYS_SIDECAR_URL:-http://baileys:3500}
      - BAILEYS_SIDECAR_API_KEY=${BAILEYS_SIDECAR_API_KEY:-nexus-internal-baileys}
      - NODE_ENV=development
      - RAILS_ENV=development
      # Match postgres service when .env leaves POSTGRES_PASSWORD blank (database.yml default password is "").
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  sidekiq:
    <<: *base
    image: nexus-rails:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    depends_on:
      - postgres
      - redis
      - mailhog
    environment:
      - NODE_ENV=development
      - RAILS_ENV=development
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  vite:
    <<: *base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/vite.Dockerfile
    image: nexus-vite:development
    volumes:
      - ./:/app:delegated
      - node_modules:/app/node_modules
      - packs:/app/public/packs
      - cache:/app/tmp/cache
      - bundle:/usr/local/bundle
    ports:
      - "3036:3036" # Vite dev server
    environment:
      - VITE_DEV_SERVER_HOST=0.0.0.0
      # Browser tab loads localhost:3000 → HMR must reach vite via localhost (published port).
      - VITE_HMR_CLIENT_HOST=localhost
      - VITE_HMR_CLIENT_PORT=3036
      - NODE_ENV=development
      - RAILS_ENV=development
    entrypoint: docker/entrypoints/vite.sh
    command: bin/vite dev

  baileys:
    build:
      context: ./baileys-sidecar
      dockerfile: Dockerfile
    image: nexus-mvp-baileys-sidecar:development
    restart: unless-stopped
    ports:
      - '127.0.0.1:3500:3500'
    volumes:
      - baileys_sessions:/data/sessions
    environment:
      PORT: 3500
      NODE_ENV: development
      NEXUS_WEBHOOK_URL: http://rails:3000
      BAILEYS_SIDECAR_API_KEY: ${BAILEYS_SIDECAR_API_KEY:-nexus-internal-baileys}
      SESSIONS_DIR: /data/sessions
      LOG_LEVEL: info
    depends_on:
      - rails

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '5432:5432'
    volumes:
      - postgres:/data/postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-chatwoot_dev}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis:/data/redis
    ports:
      - '6379:6379'

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

volumes:
  postgres:
  redis:
  packs:
  node_modules:
  cache:
  bundle:
  baileys_sessions:
