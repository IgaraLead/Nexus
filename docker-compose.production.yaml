version: '3'

services:
  base: &base
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        BUNDLE_WITHOUT: 'development:test'
        EXECJS_RUNTIME: Disabled
        RAILS_ENV: 'production'
        RAILS_SERVE_STATIC_FILES: 'true'
    image: ${NEXUS_IMAGE:-nexus:latest}
    env_file: .env ## Change this file for customized env variables
    volumes:
      - storage_data:/app/storage

  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - BAILEYS_SIDECAR_URL=${BAILEYS_SIDECAR_URL:-http://baileys:3500}
      - BAILEYS_SIDECAR_API_KEY=${BAILEYS_SIDECAR_API_KEY:-nexus-internal-baileys}
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    restart: always

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - BAILEYS_SIDECAR_URL=${BAILEYS_SIDECAR_URL:-http://baileys:3500}
      - BAILEYS_SIDECAR_API_KEY=${BAILEYS_SIDECAR_API_KEY:-nexus-internal-baileys}
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nexus
      - POSTGRES_USER=postgres
      # Please provide your own password.
      - POSTGRES_PASSWORD=

  redis:
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'

  baileys:
    build:
      context: ./baileys-sidecar
      dockerfile: Dockerfile
    image: ${BAILEYS_IMAGE:-nexus-baileys-sidecar:latest}
    restart: always
    ports:
      - '127.0.0.1:3500:3500'
    volumes:
      - baileys_sessions:/data/sessions
    environment:
      PORT: 3500
      NODE_ENV: production
      NEXUS_WEBHOOK_URL: ${NEXUS_WEBHOOK_URL:-http://rails:3000}
      BAILEYS_SIDECAR_API_KEY: ${BAILEYS_SIDECAR_API_KEY:-nexus-internal-baileys}
      SESSIONS_DIR: /data/sessions
      LOG_LEVEL: info
    depends_on:
      - rails

volumes:
  storage_data:
  postgres_data:
  redis_data:
  baileys_sessions:
